{{define "head"}}
<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Store.Name}}</title>
<style>
  :root { --accent: {{.Theme.AccentColor}}; }
  body { font-family: system-ui, sans-serif; margin: 0; color: #1a1a2e; }
  header { background: var(--accent); color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
  header a { color: #fff; text-decoration: none; }
  main { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
  .card { border: 1px solid #e2e4ea; border-radius: 8px; padding: 1rem; }
  .card a { color: inherit; text-decoration: none; font-weight: 600; }
  .price { color: #555; margin-top: .3rem; }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 6px; padding: .6rem 1.2rem; cursor: pointer; font-size: 1rem; }
  select, input { padding: .5rem; margin: .3rem 0; border: 1px solid #cfd3dd; border-radius: 6px; }
  table { width: 100%; border-collapse: collapse; } td, th { text-align: left; padding: .5rem; border-bottom: 1px solid #eee; }
  .muted { color: #777; font-size: .9rem; }
</style>
<script>
  const ORDERS_URL = {{.Config.OrdersURL}};
  const STORE_HANDLE = {{.Store.Handle}};
  const cartKey = "cc_cart_" + STORE_HANDLE;
  async function api(path, opts) {
    const res = await fetch(ORDERS_URL + path, Object.assign({headers: {"Content-Type": "application/json"}}, opts));
    if (!res.ok) throw new Error((await res.json().catch(()=>({}))).message || res.statusText);
    return res.status === 204 ? null : res.json();
  }
  async function ensureCart() {
    let id = localStorage.getItem(cartKey);
    if (id) { try { await api("/v1/public/carts/" + id); return id; } catch (e) { localStorage.removeItem(cartKey); } }
    const cart = await api("/v1/public/carts", {method: "POST", body: JSON.stringify({store_handle: STORE_HANDLE})});
    localStorage.setItem(cartKey, cart.id);
    return cart.id;
  }
</script>
</head><body>
<header><a href="/{{.Store.Handle}}"><strong>{{.Store.Name}}</strong></a>
<a href="/{{.Store.Handle}}/cart">Cart</a></header><main>
{{end}}
{{define "foot"}}</main></body></html>{{end}}
