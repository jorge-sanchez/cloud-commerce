name: Deploy

# Manual for now: the first real deploy is gated on the database decision
# (ADR-003 defers it), and the example service is a template, not a product.
# When real services exist, add push-triggered deploys per service path.
on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (directory under services/)"
        required: true
        default: "example"

# GitHub's OIDC token is exchanged for short-lived GCP credentials via
# Workload Identity Federation — no service-account keys (see infra/main.tf).
permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ inputs.service }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, migrate, deploy ${{ inputs.service }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ vars.GCP_ARTIFACT_REGISTRY }}/${{ inputs.service }}:${GITHUB_SHA}"
          docker build -f "services/${{ inputs.service }}/Dockerfile" -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Run migrations
        # DATABASE_URL lives in Secret Manager as <service>-database-url;
        # the deployer SA reads it here so the URL never touches GitHub.
        run: |
          DATABASE_URL=$(gcloud secrets versions access latest \
            --secret="${{ inputs.service }}-database-url" \
            --project="${{ vars.GCP_PROJECT_ID }}")
          curl -sSfL https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz \
            | tar xz migrate
          ./migrate -path "services/${{ inputs.service }}/migrations" -database "$DATABASE_URL" up

      - name: Deploy to Cloud Run
        run: |
          # Every service verifies platform tokens; only merchants — the
          # identity issuer (ADR-006) — receives the private key.
          SECRETS="DATABASE_URL=${{ inputs.service }}-database-url:latest"
          SECRETS="$SECRETS,OUTBOX_DRAIN_TOKEN=${{ inputs.service }}-drain-token:latest"
          SECRETS="$SECRETS,JWT_PUBLIC_KEY=jwt-public-key:latest"
          if [ "${{ inputs.service }}" = "merchants" ]; then
            SECRETS="$SECRETS,JWT_PRIVATE_KEY=jwt-private-key:latest"
          fi
          gcloud run deploy "${{ inputs.service }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ vars.GCP_REGION }}" \
            --image="$IMAGE" \
            --service-account="${{ vars.GCP_RUNTIME_SA }}" \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --set-env-vars="APP_ENV=production" \
            --set-secrets="$SECRETS"

      - name: Report URL
        run: |
          gcloud run services describe "${{ inputs.service }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ vars.GCP_REGION }}" \
            --format="value(status.url)"
